# ===================================================
# ReadRune - CI/CD Pipeline
# Tự động chạy test Selenium khi push/pull request
# ===================================================
name: ReadRune Selenium Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout mã nguồn
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # 2. Cài đặt JDK 17
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Cài đặt Chrome
      - name: 🌐 Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'

      # 4. Build project (bỏ qua test)
      - name: 🔨 Build project
        run: mvn -DskipTests package -q

      # 5. Chạy tests (headless mode)
      - name: 🧪 Run Selenium Tests
        run: mvn test -Dbrowser=chrome -Dheadless=true
        continue-on-error: true

      # 6. Sinh báo cáo Surefire
      - name: 📊 Generate Surefire Report
        run: mvn surefire-report:report -q
        if: always()

      # 7. Upload test reports
      - name: 📤 Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            target/surefire-reports/
            target/ExtentReports/
            target/screenshots/
            target/site/
          retention-days: 30

      # 8. Tổng kết kết quả test
      - name: 📋 Test Summary
        if: always()
        run: |
          echo "=========================================="
          echo "    📋 KẾT QUẢ KIỂM THỬ READRUNE"
          echo "=========================================="
          if [ -d "target/surefire-reports" ]; then
            echo "📁 Surefire reports: target/surefire-reports/"
            cat target/surefire-reports/*.txt 2>/dev/null || echo "Không tìm thấy file .txt"
          fi
          if [ -f "target/ExtentReports/report.html" ]; then
            echo "📁 Extent Report: target/ExtentReports/report.html"
          fi
          echo "=========================================="
